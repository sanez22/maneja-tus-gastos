# 📁 Pega aquí el contenido del README → Parte 2.1 (deploy-frontend.yml)

name: 🚀 Deploy Frontend → Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  test-and-deploy:
    name: Test, Build & Deploy Angular
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: 🧪 Correr unit tests
        working-directory: frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: 🏗️ Build producción
        working-directory: frontend
        run: npm run build:prod

      - name: 🔥 Deploy a Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          entryPoint: ./frontend